name: abhay_portfolio
description: A complete production-grade Flutter Web portfolio for Abhay Sharma.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  go_router: ^14.0.0
  cached_network_image: ^3.4.1
  image_picker:
  html_editor_enhanced: ^2.7.1
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  lottie: ^3.1.2
  visibility_detector: ^0.4.0+2
  url_launcher: ^6.3.0
  responsive_framework: ^1.5.1
  flutter_svg: ^2.0.10+1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.3
  uuid: ^4.5.3
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
