name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Update Version Code
        run: |
          sed -i 's/static const String appVersion = "[^"]*";/static const String appVersion = "1.3.${{ github.run_number }}";/g' lib/core/constants/app_constants.dart

      - name: Build Web
        run: flutter build web --release --base-href "/"

      - name: Deploy to External Public Repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository-name: abhaysharma20/abhaysharma20.github.io
          branch: main
          folder: build/web
